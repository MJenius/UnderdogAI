syntax = "proto3";

package simulation;

message MatchPredictionRequest {
  string home_team = 1;
  string away_team = 2;
  string tournament_date = 3;
}

message MatchPredictionResponse {
  float home_win_prob = 1;
  float away_win_prob = 2;
  float draw_prob = 3;
  float underdog_signal_score = 4;
  string risk_label = 5;
  string explainability_narrative = 6;
  float home_tier_form = 7;
  float away_tier_form = 8;
  float h2h_bias = 9;
  float shootout_resilience_home = 10;
  float shootout_resilience_away = 11;
  float momentum_home = 12;
  float momentum_away = 13;
  bool bogey_team_flag = 14;
}

message TournamentSimulationRequest {
  int32 tournament_year = 1;
  int32 simulation_runs = 2;
  string progression_mode = 3;
}

message TierLookbackStats {
  float trailing_point_velocity = 1;
  float trailing_goal_margin = 2;
  string opponent_tier = 3;
}

message FixtureRequest {
  int32 tournament_year = 1;
}

message TournamentFixture {
  string home_team = 1;
  string away_team = 2;
  string match_date = 3;
  float home_win_prob = 4;
  float away_win_prob = 5;
  float draw_prob = 6;
  float upset_probability = 7;
  string risk_label = 8;
  string explainability_narrative = 9;
  TierLookbackStats home_lookback = 10;
  TierLookbackStats away_lookback = 11;
  float h2h_bias = 12;
}

message SimulationStatusRequest {
  string task_id = 1;
}

message SimulationTaskStatus {
  string task_id = 1;
  string status = 2;
  string redis_key = 3;
  float progress = 4;
  map<string, float> result = 5;
  string progression_mode = 6;
}

message FixtureListResponse {
  repeated TournamentFixture fixtures = 1;
}

service SimulationService {
  rpc PredictMatch(MatchPredictionRequest) returns (MatchPredictionResponse);
  rpc SimulateTournament(TournamentSimulationRequest) returns (SimulationTaskStatus);
  rpc GetSimulationStatus(SimulationStatusRequest) returns (SimulationTaskStatus);
  rpc GetFixtures(FixtureRequest) returns (FixtureListResponse);
}

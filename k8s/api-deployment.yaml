apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: underdog-api:latest
        imagePullPolicy: Never
        ports:
        - name: rest
          containerPort: 8000
        - name: grpc
          containerPort: 50051
        env:
        - name: POSTGRES_HOST
          value: postgres
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: analytical_sandbox
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: "6379"
        - name: KAFKA_BROKERS
          value: kafka:9092
        livenessProbe:
          httpGet:
            path: /api/v1/predict
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/predict
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: NodePort
  ports:
  - name: rest
    port: 8000
    targetPort: 8000
    nodePort: 30080
  - name: grpc
    port: 50051
    targetPort: 50051
    nodePort: 30051
  selector:
    app: api
